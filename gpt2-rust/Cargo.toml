[package]
name = "gpt2-rust"
version = "0.1.0"
edition = "2021"

[dependencies]
burn = { version = "0.16", features = ["train", "wgpu", "ndarray", "fusion"] }
burn-ndarray = "0.16"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.8"

[profile.release]
lto = "fat"
codegen-units = 1
opt-level = 3
panic = "abort"
